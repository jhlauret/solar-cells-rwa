# ============================================================
#  SolarCells RWA — nginx reverse proxy
#
#  En développement :
#    /            → frontend Vite (5173)  avec HMR WebSocket
#    /api/*       → backend Node.js (3001)
#    /health      → backend Node.js (3001)
#
#  En production :
#    /            → fichiers statiques depuis /usr/share/nginx/html
#    /api/*       → backend Node.js (3001)
#    /health      → backend Node.js (3001)
# ============================================================

upstream backend {
    server backend:3001;
    keepalive 32;
}

upstream frontend_dev {
    server frontend:5173;
    keepalive 16;
}

# ── Sécurité : cacher la version nginx ──────────────────────
server_tokens off;

# ── Taille max des uploads (documents KYC : 10 MB) ──────────
client_max_body_size 12m;

# ── Timeouts ────────────────────────────────────────────────
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

server {
    listen 80;
    server_name _;

    # ── Headers de sécurité ──────────────────────────────────
    add_header X-Frame-Options           DENY            always;
    add_header X-Content-Type-Options    nosniff         always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           strict-origin   always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Health check nginx ───────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Stripe webhook : corps brut requis ───────────────────
    # Le backend utilise express.raw() — nginx ne doit pas modifier le body
    location /api/v1/webhooks/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Désactiver la mise en buffer pour les webhooks
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # ── API REST + health ────────────────────────────────────
    location ~ ^/(api|health) {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    on;
        proxy_buffer_size  8k;
    }

    # ── Vite HMR WebSocket (dev uniquement) ─────────────────
    location /@vite {
        proxy_pass         http://frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Frontend en développement ────────────────────────────
    location / {
        proxy_pass         http://frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # SPA : ne pas cacher index.html
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
