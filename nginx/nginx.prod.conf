# ============================================================
#  SolarCells RWA — nginx production
#  Sert les fichiers statiques du build React depuis /usr/share/nginx/html
# ============================================================

server_tokens off;
client_max_body_size 12m;

upstream backend {
    server backend:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Rediriger HTTP → HTTPS en production
    # (activé derrière un load balancer qui gère le SSL)
    # return 301 https://$host$request_uri;

    add_header X-Frame-Options         DENY            always;
    add_header X-Content-Type-Options  nosniff         always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         strict-origin   always;

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Stripe webhooks (corps brut)
    location /api/v1/webhooks/ {
        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_request_buffering off;
    }

    # API
    location ~ ^/(api|health) {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Assets statiques — cache agressif (1 an, immutable grâce au hash Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA — toutes les routes → index.html
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
        # index.html : pas de cache
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
