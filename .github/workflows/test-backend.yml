name: Test — Backend Node.js

on:
  pull_request:
    paths:
      - 'backend-node/**'
      - '.github/workflows/test-backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend-node/**'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Jest + TypeScript
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: backend-node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint
        continue-on-error: true   # warning, pas bloquant

      - name: Run Jest tests
        run: npm test -- --coverage --coverageReporters=lcov,text-summary
        env:
          NODE_ENV:              test
          JWT_ACCESS_SECRET:     ci-access-secret-min-32-characters-ok
          JWT_REFRESH_SECRET:    ci-refresh-secret-min-32-characters-ok
          ODOO_URL:              http://localhost:8069
          ODOO_DB:               solarcells_test
          ODOO_API_USER:         api@test.com
          ODOO_API_PASSWORD:     test_password
          MINIO_ENDPOINT:        localhost
          MINIO_ACCESS_KEY:      minioadmin
          MINIO_SECRET_KEY:      minioadmin
          STRIPE_SECRET_KEY:     sk_test_placeholder_for_ci_only
          STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_ci_only

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend-node/coverage/lcov.info
          retention-days: 7
